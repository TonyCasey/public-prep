name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  wait-for-railway:
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Railway auto-deploy
        run: |
          echo "Waiting for Railway to auto-deploy from main branch..."
          sleep 120

      - name: Health check
        run: |
          curl --fail --retry 10 --retry-delay 15 https://publicprep.ie/api/health || exit 1

      - name: Deployment summary
        run: |
          echo "## Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://publicprep.ie" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
