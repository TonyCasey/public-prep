name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  wait-for-railway:
    runs-on: ubuntu-latest
    outputs:
      staging_url: ${{ steps.get-url.outputs.url }}

    steps:
      - name: Get staging URL
        id: get-url
        run: echo "url=https://staging.publicprep.ie" >> $GITHUB_OUTPUT

      - name: Wait for Railway auto-deploy
        run: |
          echo "Waiting for Railway to auto-deploy from staging branch..."
          sleep 120

      - name: Health check
        run: |
          curl --fail --retry 10 --retry-delay 15 https://staging.publicprep.ie/api/health || exit 1

  e2e-tests:
    needs: wait-for-railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against staging
        run: npx playwright test
        env:
          CI: true
          BASE_URL: ${{ needs.wait-for-railway.outputs.staging_url }}
          PLAYWRIGHT_BASE_URL: ${{ needs.wait-for-railway.outputs.staging_url }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  promote-to-main:
    needs: e2e-tests
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge staging to main
        run: |
          git fetch origin main
          git checkout main
          git merge origin/staging --no-edit
          git push origin main

      - name: Create promotion summary
        run: |
          echo "## Staging promoted to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "E2E tests passed. Staging has been merged to main." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
